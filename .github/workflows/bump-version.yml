name: Auto Bump Version Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history and tags

      - name: Determine and Push New Tag
        run: |
          # Fetch all remote tags
          git fetch --tags
          
          # Get the latest semantic version tag, fallback to 1.0.0 if none exist
          LATEST_TAG=$(git tag -l --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="1.0.0"
          fi
          echo "Latest tag found: $LATEST_TAG"
          
          # Normalize tag format (remove 'v' prefix if present, append micro digit if missing)
          CLEAN_TAG=$(echo "$LATEST_TAG" | sed 's/^v//')
          if [[ "$CLEAN_TAG" =~ ^[0-9]+\.[0-9]+$ ]]; then
            CLEAN_TAG="${CLEAN_TAG}.0"
          fi
          
          # Split into major, minor, patch parts
          IFS='.' read -r -a VERSION_PARTS <<< "$CLEAN_TAG"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]:-0}
          
          # Inspect the latest commit message for bump directives
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit Message: $COMMIT_MSG"
          
          BUMP="patch"
          if [[ "$COMMIT_MSG" == *"#major"* ]]; then
            BUMP="major"
          elif [[ "$COMMIT_MSG" == *"#minor"* ]]; then
            BUMP="minor"
          fi
          
          echo "Bump type determined: $BUMP"
          
          # Calculate the new version number
          if [ "$BUMP" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" == "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_TAG="${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag to create: $NEW_TAG"
          
          # Create and push the new tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
